Identifier: eos2egp
Slug: chelating-groups
Status: In progress
Title: Chelator fragment identification
Description: The Chelator Rules, defined by Agrawal et al. (2010) and implemented as part of the ChemFH package, check a molecule against 55 SMARTS patterns representing chelating functional groups that target metalloproteinases. Chelating groups covered include picolinic acids, hydroxyquinolines, hydroxypyrimidines, hydroxypyranones, 3,4-HOPO and 3,4-HOPTO derivatives, salicylic acids, catechols, sulfonamides, beta-diketones, and others. The model returns a binary flag for each of the 55 substructures and the total number of matched substructures.

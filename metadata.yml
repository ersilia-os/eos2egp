Identifier: eos2egp
Slug: chelating-groups
Status: In progress
Title: Chelator fragment identification
Description: The Chelator Rules, defined by Agrawal et al, 2010 and implemented 
  as part of the ChemFH package (model eos7ye0) check a molecule against 55 
  SMARTS patterns representing chelating functional groups that target 
  metalloproteinases. This includes for example hydroxyquinolines, sulfonamides 
  or pyrimidines. the model identifies whether a given molecule has any of the 
  55 defined substructures.
